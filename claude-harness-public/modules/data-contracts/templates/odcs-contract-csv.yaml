# {NAME} — {ONE_LINE_DESCRIPTION}
# See: docs/datacontracts/CLAUDE.md for conventions
kind: DataContract
apiVersion: v3.1.0
id: dc-{KEBAB_NAME}-001
version: 1.0.0
status: draft
name: "{NAME}"
domain: {DOMAIN}
dataProduct: {DATA_PRODUCT}

description:
  purpose: |
    {PURPOSE}
  limitations: |
    {LIMITATIONS}
  usage: |
    {USAGE}

# Optional: Link to specs, code, tests (STANDARD/COMPREHENSIVE mode)
# authoritativeDefinitions:
#   - type: specification
#     url: {SPEC_PATH}
#     description: {SPEC_DESCRIPTION}
#   - type: codeRepository
#     url: {CODE_PATH}
#     description: {CODE_DESCRIPTION}
#   - type: testSuite
#     url: {TEST_PATH}
#     description: {TEST_DESCRIPTION}

servers:
  - server: csv-output
    type: local
    description: "{OUTPUT_DESCRIPTION}"
    environment: production
    customProperties:
      - property: pathPattern
        value: "{OUTPUT_PATH_PATTERN}"
  # Optional: Add DB server if CSV is also loaded to a table
  # - server: postgres-production
  #   type: postgres
  #   description: Production database table
  #   environment: production
  #   host: "${DB_HOST}"
  #   port: 5432
  #   database: {DATABASE}
  #   schema: {SCHEMA}

schema:
  - id: {SCHEMA_ID}
    name: {SCHEMA_NAME}
    # physicalName: {TABLE_NAME}  # if loaded to DB
    logicalType: object
    businessName: "{NAME}"
    description: |
      {SCHEMA_DESCRIPTION}
    dataGranularityDescription: "{GRANULARITY}"
    tags: [{TAGS}]
    quality:
      - id: qr-row-count
        name: Minimum row count
        type: library
        dimension: completeness
        severity: error
        description: Output must have at least {MIN_ROWS} rows
        customProperties:
          - property: metric
            value: rowCount
          - property: operator
            value: ">="
          - property: value
            value: {MIN_ROWS}
      # Add more table-level quality rules from the catalog
    properties:
      # Repeat this block for each column:
      - id: {COLUMN_NAME}
        name: {COLUMN_NAME}
        logicalType: {LOGICAL_TYPE}  # string | integer | number | boolean | date | timestamp
        required: {true_or_false}
        description: |
          {COLUMN_DESCRIPTION}
        # examples: [{EXAMPLES}]
        # classification: public | internal | confidential | restricted
        # quality:
        #   - id: qr-{COLUMN_NAME}-not-null
        #     name: "{COLUMN_NAME} not null"
        #     type: library
        #     dimension: completeness
        #     severity: error
        #     customProperties:
        #       - property: metric
        #         value: nullValues
        #       - property: operator
        #         value: "=="
        #       - property: value
        #         value: 0

# Optional: SLA properties (STANDARD/COMPREHENSIVE mode)
# slaProperties:
#   - property: freshness
#     description: "{FRESHNESS_DESCRIPTION}"
#     customProperties:
#       - property: gate
#         value: "{FRESHNESS_GATE_COMMAND}"
#   - property: retention
#     description: "{RETENTION_DESCRIPTION}"
#     value: {RETENTION_VALUE}
#     unit: {RETENTION_UNIT}  # d, m, y

# Optional: Custom properties (COMPREHENSIVE mode)
# customProperties:
#   - property: {PROPERTY_NAME}
#     value: "{PROPERTY_VALUE}"
#     description: "{PROPERTY_DESCRIPTION}"

contractCreatedTs: "{CREATED_TIMESTAMP}"
