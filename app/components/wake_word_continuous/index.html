<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Hey CJP — Wake-Word Component</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }
    html, body {
      margin: 0; padding: 0;
      background: transparent;
      overflow: hidden;
    }
    #root {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 64px;
      padding: 0 1rem;
    }
    /* The visible LISTENING / CAPTURING / THINKING / SPEAKING pill.
       Same frosted-glass treatment as the surrounding kiosk console
       so it visually drops into the existing two-column layout. */
    .ww-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.7rem;
      padding: 0.55rem 1.2rem;
      min-width: 220px;
      height: 48px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(12px) saturate(150%);
      -webkit-backdrop-filter: blur(12px) saturate(150%);
      border: 1px solid rgba(255, 255, 255, 0.20);
      color: #f6f1e1;
      font-size: 0.92rem;
      font-weight: 600;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      box-shadow:
        0 10px 22px -12px rgba(0, 0, 0, 0.55),
        inset 0 1px 0 rgba(255, 255, 255, 0.10);
      transition: background 0.2s ease, border-color 0.2s ease,
                  box-shadow 0.2s ease;
      justify-content: center;
    }
    .ww-status-text { white-space: nowrap; }

    /* State-specific accent — border + soft glow, no fill colour. */
    .ww-pill-listening  { border-color: rgba(74, 210, 149, 0.55); box-shadow: 0 0 18px -4px rgba(74, 210, 149, 0.45), inset 0 1px 0 rgba(255,255,255,0.12); }
    .ww-pill-capturing  { border-color: rgba(102, 179, 255, 0.65); box-shadow: 0 0 18px -4px rgba(102, 179, 255, 0.55), inset 0 1px 0 rgba(255,255,255,0.12); animation: ww-pulse 1.2s ease-in-out infinite; }
    .ww-pill-processing { border-color: rgba(242, 196, 78, 0.55); box-shadow: 0 0 18px -4px rgba(242, 196, 78, 0.45), inset 0 1px 0 rgba(255,255,255,0.12); }
    .ww-pill-speaking   { border-color: rgba(242, 196, 78, 0.85); box-shadow: 0 0 22px -2px rgba(242, 196, 78, 0.55), inset 0 1px 0 rgba(255,255,255,0.15); }
    .ww-pill-loading    { border-color: rgba(255, 255, 255, 0.22); }
    .ww-pill-error      { border-color: rgba(217, 127, 95, 0.75); color: #f2c4ad; }
    @keyframes ww-pulse {
      0%, 100% { transform: scale(1.0); }
      50%      { transform: scale(1.04); }
    }
    .ww-spinner {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: currentColor;
      box-shadow: 0 0 10px currentColor;
      flex-shrink: 0;
    }
    .ww-pill-listening  .ww-spinner { background: #4ad295; box-shadow: 0 0 10px #4ad295; }
    .ww-pill-capturing  .ww-spinner { background: #66b3ff; box-shadow: 0 0 12px #66b3ff; }
    .ww-pill-processing .ww-spinner { background: #f2c44e; box-shadow: 0 0 10px #f2c44e; }
    .ww-pill-speaking   .ww-spinner { background: #f2c44e; box-shadow: 0 0 12px #f2c44e; animation: ww-pulse 0.9s ease-in-out infinite; }
    .ww-pill-error      .ww-spinner { background: #d97f5f; box-shadow: 0 0 10px #d97f5f; }
  </style>
</head>
<body>
  <div id="root"></div>
  <!-- The built bundle. Produced by `npm run build` from src/wake_word.js.
       Committed alongside this index.html so the kiosk has no runtime
       network dependency once the page is loaded. -->
  <script src="./dist/wake_word.bundle.js"></script>
</body>
</html>
